name: test

# On every pull request, but only on push to master
on:
  push:
    branches:
    - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable Corepack / Yarn 4
        run: |
          corepack enable
          corepack prepare yarn@4.13.0 --activate
          yarn -v

      - name: Setup Node (with Corepack)
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn' # or 'pnpm', 'npm' depending on your package manager
          cache-dependency-path: yarn.lock

      - name: Install dependencies
        run: yarn install --immutable

      - name: Install Playwright Chromium
        run: yarn playwright:install
  
      - name: Build code
        run: |
          yarn build
  
      - name: Run node tests
        run: |
          yarn test-node

      - name: Run headless tests and generate coverage
        run: |
          yarn test-coverage

      - name: Sanitize lcov for Coveralls
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const coveragePath = 'coverage/lcov.info';
          const lines = fs.readFileSync(coveragePath, 'utf8').split(/\r?\n/);
          const records = [];
          let currentRecord = [];

          for (const line of lines) {
            currentRecord.push(line);
            if (line === 'end_of_record') {
              const sourceFileLine = currentRecord.find(recordLine => recordLine.startsWith('SF:'));
              const sourceFile = sourceFileLine ? sourceFileLine.slice(3).trim() : '';
              if (sourceFile) {
                records.push(currentRecord.join('\n'));
              }
              currentRecord = [];
            }
          }

          if (currentRecord.length) {
            const sourceFileLine = currentRecord.find(recordLine => recordLine.startsWith('SF:'));
            const sourceFile = sourceFileLine ? sourceFileLine.slice(3).trim() : '';
            if (sourceFile) {
              records.push(currentRecord.join('\n'));
            }
          }

          fs.writeFileSync(coveragePath, `${records.join('\n')}\n`);
          NODE

      - name: Run lint
        run: |
          yarn lint

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@09b709cf6a16e30b0808ba050c7a6e8a5ef13f8d # v1.2.5
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

  website:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable Corepack / Yarn 4
        run: |
          corepack enable
          corepack prepare yarn@4.13.0 --activate
          yarn -v

      - name: Setup Node (with Corepack)
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
          cache-dependency-path: yarn.lock

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build website
        run: yarn website:build

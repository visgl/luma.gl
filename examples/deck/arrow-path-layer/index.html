<!doctype html>
<script type="module">
  import {createArrowPathLayerDeck} from './app.ts';
  const deviceSelect = document.querySelector('#deck-device');
  let example = createArrowPathLayerDeck(undefined, {deviceType: deviceSelect.value});
  deviceSelect.addEventListener('change', () => {
    example.finalize();
    example = createArrowPathLayerDeck(undefined, {deviceType: deviceSelect.value});
  });
</script>
<body>
  <label style="position: fixed; top: 12px; left: 12px; z-index: 10; padding: 8px 10px; background: white; font: 14px sans-serif;">
    Device
    <select id="deck-device">
      <option value="webgpu">WebGPU</option>
      <option value="webgl">WebGL2</option>
    </select>
  </label>
  <div id="arrow-example-panel-host" data-example-panel-host="" style="position: fixed; top: 12px; right: 12px; z-index: 10; width: min(520px, calc(100vw - 24px)); max-height: calc(100vh - 24px); overflow: auto; background: white;"></div>
</body>

<!doctype html>
<head>
  <style>
    :root {
      color-scheme: light;
      background: #f7f8fb;
      color: #16202f;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      background: #f7f8fb;
      overflow: hidden;
    }

    .gpgpu-showcase {
      box-sizing: border-box;
      min-height: 100vh;
      padding: 22px;
    }

    .gpgpu-showcase * {
      box-sizing: border-box;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      font-weight: 720;
    }

    .subtitle {
      max-width: 860px;
      margin: 8px 0 18px;
      color: #5b6678;
      font-size: 14px;
      line-height: 1.45;
    }

    .metadata-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(140px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .metric {
      border: 1px solid #d9dee8;
      border-radius: 8px;
      background: #fff;
      padding: 10px 12px;
    }

    .metric span,
    .header-cell small,
    .expression-note,
    .status {
      color: #697386;
      font-size: 12px;
    }

    .metric strong {
      display: block;
      margin-top: 3px;
      font-size: 16px;
      font-variant-numeric: tabular-nums;
    }

    .expression-panel {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }

    .expression-panel label {
      font-size: 13px;
      font-weight: 680;
    }

    .expression-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
    }

    .expression-row input,
    .expression-row button {
      border: 1px solid #cfd6e2;
      border-radius: 8px;
      background: #fff;
      color: inherit;
      font: 14px/1.4 ui-monospace, "SFMono-Regular", Consolas, monospace;
      padding: 9px 10px;
    }

    .expression-row button {
      min-width: 76px;
      background: #eef2f7;
      color: #7b8494;
    }

    .table-panel {
      min-width: 0;
      border: 1px solid #d9dee8;
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }

    .table-row-grid {
      display: grid;
      grid-template-columns: var(
        --table-grid-template,
        112px minmax(300px, 1.2fr) minmax(120px, 0.45fr) minmax(320px, 1.25fr)
      );
    }

    .table-header-clip {
      border-bottom: 1px solid #d9dee8;
      background: #f2f5f9;
      overflow: hidden;
    }

    .table-header {
      min-width: 880px;
      will-change: transform;
    }

    .header-cell,
    .table-cell {
      min-width: 0;
      border-right: 1px solid #e4e8f0;
      padding: 8px 10px;
    }

    .header-cell:last-child,
    .table-cell:last-child {
      border-right: 0;
    }

    .header-cell span {
      display: block;
      font-size: 13px;
      font-weight: 720;
    }

    .header-cell small {
      display: block;
      margin-top: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .table-scroll {
      height: calc(100vh - 380px);
      min-height: 360px;
      overflow: auto;
      position: relative;
      contain: strict;
    }

    .row-layer {
      position: relative;
      min-width: 880px;
    }

    .data-row {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 34px;
    }

    .data-row .table-cell {
      height: 34px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      border-bottom: 1px solid #edf0f5;
      font: 12px/33px ui-monospace, "SFMono-Regular", Consolas, monospace;
      font-variant-numeric: tabular-nums;
    }

    .row-index {
      color: #596579;
      background: #fbfcfe;
    }

    .status {
      border-top: 1px solid #d9dee8;
      padding: 8px 10px;
      min-height: 30px;
    }

    @media (max-width: 760px) {
      .gpgpu-showcase {
        padding: 14px;
      }

      .metadata-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .table-row-grid {
        grid-template-columns: var(--table-grid-template, 96px 260px 120px 280px);
      }
    }
  </style>
</head>
<body>
  <main id="app" class="gpgpu-showcase">
    <h1>@luma.gl/gpgpu evaluator showcase</h1>
    <p class="subtitle">
      Arrow-backed source columns are extracted as typed-array views and wrapped in GPUDataEvaluator inputs.
    </p>

    <div class="metadata-grid">
      <div class="metric">
        <span>Rows</span>
        <strong id="metadata-rows">-</strong>
      </div>
      <div class="metric">
        <span>Columns</span>
        <strong id="metadata-columns">-</strong>
      </div>
      <div class="metric">
        <span>Metric Values</span>
        <strong id="metadata-metric-values">-</strong>
      </div>
      <div class="metric">
        <span>Arrow Batches</span>
        <strong id="metadata-arrow-batches">-</strong>
      </div>
    </div>

    <form id="expression-form" class="expression-panel">
      <label for="expression-input">Expression</label>
      <div class="expression-row">
        <input id="expression-input" type="text" value="fround(coordinates)" spellcheck="false" />
        <button id="expression-run" type="submit" disabled>Run</button>
      </div>
      <div id="expression-message" class="expression-note">
        Run an expression to append its evaluated output as the last table column.
      </div>
    </form>

    <section class="table-panel">
      <div class="table-header-clip">
        <div id="table-header" class="table-header table-row-grid"></div>
      </div>
      <div id="table-scroll" class="table-scroll">
        <div id="table-row-layer" class="row-layer"></div>
      </div>
      <div id="table-status" class="status">Generating Arrow table...</div>
    </section>
  </main>
  <script type="module" src="./src/app.ts"></script>
</body>

<!doctype html>
<head>
  <script type="module">
    import {makeAnimationLoop} from '@luma.gl/engine';
    import {webgpuAdapter} from '@luma.gl/webgpu';
    import {webgl2Adapter} from '@luma.gl/webgl';
    import AnimationLoopTemplate from './app.ts';

    const animationLoop = makeAnimationLoop(AnimationLoopTemplate, {
      adapters: [webgpuAdapter, webgl2Adapter]
    });
    animationLoop.start();
  </script>
  <style>
    html,
    body {
      height: 100%;
    }

    body {
      background:
        radial-gradient(circle at top, rgba(25, 58, 96, 0.45), transparent 40%),
        linear-gradient(180deg, #08111d 0%, #0b1726 55%, #08121b 100%);
      margin: 0;
      overflow: hidden;
    }

    canvas {
      height: 100% !important;
      width: 100% !important;
      transition: opacity 0.8s ease;
    }
  </style>
</head>
<body></body>

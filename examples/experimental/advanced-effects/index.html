<!doctype html>
<head>
  <style>
    body { margin: 0; background: #030712; color-scheme: dark; }
    #advanced-effects-comparison-splitter {
      position: fixed;
      width: 24px;
      transform: translateX(-50%);
      cursor: col-resize;
      touch-action: none;
      z-index: 10;
      outline: none;
    }
    #advanced-effects-comparison-splitter::before {
      position: absolute;
      inset: 0 auto 0 11px;
      width: 2px;
      content: '';
      background: rgb(51 235 255 / 85%);
      box-shadow: 0 0 8px rgb(51 235 255 / 75%);
    }
    #advanced-effects-comparison-splitter::after {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 10px;
      height: 42px;
      content: '';
      transform: translate(-50%, -50%);
      border: 1px solid rgb(167 243 255 / 90%);
      border-radius: 6px;
      background: rgb(8 47 73 / 88%);
      box-shadow: 0 2px 12px rgb(0 0 0 / 45%);
    }
    #advanced-effects-comparison-splitter:hover::before,
    #advanced-effects-comparison-splitter:focus-visible::before,
    #advanced-effects-comparison-splitter[data-dragging='true']::before {
      width: 3px;
      background: #fff;
    }
  </style>
</head>
<script type="module">
  import {makeAnimationLoop} from '@luma.gl/engine';
  import {webgpuAdapter} from '@luma.gl/webgpu';
  import AnimationLoopTemplate from './app.ts';

  makeAnimationLoop(AnimationLoopTemplate, {adapters: [webgpuAdapter]}).start();
</script>
<body></body>
